name: Tests

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

      - name: Run CLI smoke tests
        run: |
          trim-haa --help
          python -m trim_haa --help
          trim-haa version

      - name: Build wheel
        run: python -m build

      - name: Inspect importability
        run: python -c "import trim_haa; print(trim_haa.__version__)"
