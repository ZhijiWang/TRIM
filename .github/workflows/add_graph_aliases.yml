name: Add graph output aliases

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/add_graph_aliases.yml"

permissions:
  contents: write

jobs:
  add-graph-aliases:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add graph aliases
        run: |
          set -euo pipefail
          cp outputs/graphs/demo_corpus.graphml outputs/graphs/demo.graphml
          cp outputs/graphs/demo_corpus_graph.json outputs/graphs/demo.json
          rm -f .github/workflows/add_graph_aliases.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No graph alias changes to commit."
          else
            git commit -m "Add demo graph output aliases"
            git push
          fi
